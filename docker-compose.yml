services:
  valkey:
    image: valkey/valkey:8
    container_name: resident-valkey-cache
    ports:
      - "6379:6379"
    volumes:
      - ./data/valkey:/data
    command: valkey-server --save 60 1 --loglevel notice
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: pgvector/pgvector:pg18
    container_name: resident-postgres-memory
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: db_resident_knowledge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: resident_secure_pwd_2026
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  resident-ui:
    build:
      context: ./resident-ui
      dockerfile: Dockerfile
    container_name: resident-ui-dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./resident-ui:/app
      - /app/node_modules
      - ./.agent:/app/.agent
      - ./data:/app/data
    environment:
      - NODE_ENV=development
    depends_on:
      - valkey
      - postgres
    restart: always

